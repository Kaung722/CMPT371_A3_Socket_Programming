name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for pygame-ce
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libfreetype6-dev \
            libportmidi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce pytest

      - name: Run unit tests (check_winner logic)
        run: python -m pytest test_server.py -v

      - name: Run integration tests (live TCP server)
        run: python -m pytest test_integration.py -v
